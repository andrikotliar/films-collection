name: Deploy App

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'apps/**'
      - 'packages/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Install dependencies
        run: pnpm i -g drizzle-kit drizzle-orm esbuild pg dotenv

      - name: Run production migrations
        working-directory: apps/api
        run: drizzle-kit migrate --config drizzle.config.ts
        env:
          DATABASE_URL: ${{ secrets.DB_CONNECTION_STR }}

      - name: Set up Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly
        run: flyctl deploy --build-arg VITE_IMAGES_URL=${{ secrets.VITE_IMAGES_URL }} --config fly.toml --remote-only --app films-collection-app
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}