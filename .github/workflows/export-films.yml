name: Export Films and Create PR

on:
  schedule:
    - cron: '0 20 * * 6' # Every Saturday at 8 PM UTC
  workflow_dispatch:
    inputs:
      days:
        description: 'Days interval for latest entries filter'
        required: false
        default: '7'
        type: string

jobs:
  export-films:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --filter ./scripts

      - name: Run export-films script
        env:
          FILMS_EXPORT_URL: ${{ secrets.FILMS_EXPORT_URL }}
          SIGNATURE_SECRET: ${{ secrets.SIGNATURE_SECRET }}
          INPUT_DAYS: ${{ inputs.days }}
        run: pnpm --filter ./scripts run export-films -- --interval $INPUT_DAYS

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: 'chore: update films data'
          title: 'chore: update films data'
          body: 'Automated update of films data.'
          branch: 'auto/export-films-data'
          base: ${{ github.ref_name }}
          add-paths: |
            apps/api/data/
          delete-branch: true
          token: ${{ secrets.GH_TOKEN }}

      - name: Merge Pull Request
        if: steps.cpr.outputs.pull-request-url != ''
        uses: peter-evans/enable-pull-request-automerge@v2
        with:
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash
          token: ${{ secrets.GH_TOKEN }}
