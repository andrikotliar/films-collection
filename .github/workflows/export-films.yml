name: Export Films and Create PR

on:
  schedule:
    - cron: '0 20 * * 6' # Every Saturday at 8 PM UTC
  workflow_dispatch:

jobs:
  export-films:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: pnpm install

      - name: Run export-films script
        env:
          FILMS_EXPORT_URL: ${{ secrets.FILMS_EXPORT_URL }}
          SIGNATURE_SECRET: ${{ secrets.SIGNATURE_SECRET }}
        run: pnpm tsx scripts/src/export-films.ts

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: 'chore: update films data'
          title: 'chore: update films data'
          body: 'Automated update of films data.'
          branch: 'auto/export-films-data'
          base: ${{ github.ref_name }}
          add-paths: |
            apps/api/data/
          delete-branch: true

      - name: Auto-approve PR
        if: steps.cpr.outputs.pull-request-url != ''
        uses: hmarr/auto-approve-action@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge Pull Request
        if: steps.cpr.outputs.pull-request-url != ''
        uses: peter-evans/merge-pull-request@v3
        with:
          pull-request: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash
          github-token: ${{ secrets.GITHUB_TOKEN }}
