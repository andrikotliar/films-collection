name: PR — TypeScript & ESLint checks

on:
  pull_request:

jobs:
  checks:
    name: TypeScript and ESLint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6

      - name: Enable corepack and install pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint check - packages/shared
        run: pnpm --filter ./packages/shared lint

      - name: TypeScript check — packages/shared
        run: pnpm --filter ./packages/shared typecheck

      - name: Build packages
        run: pnpm --filter "./packages/*" run build

      - name: Install API dependencies
        run: pnpm --filter ./apps/api install

      - name: TypeScript check — apps/api
        run: pnpm --filter ./apps/api typecheck

      - name: Install web dependencies
        run: pnpm --filter ./apps/web install

      - name: TypeScript check — apps/web
        run: pnpm --filter ./apps/web typecheck

      - name: ESLint check - apps/api
        run: pnpm --filter ./apps/api lint

      - name: ESLint check - apps/web
        run: pnpm --filter ./apps/web lint
